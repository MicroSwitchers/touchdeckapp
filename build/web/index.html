<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/touchdeckapp/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="touch_deck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>touch_deck</title>
  <link rel="manifest" href="manifest.json">

  <!--
    TouchDeck Web Speech API helper.
    Provides window.tdTTS with speak / stop / unlock methods.
    Also provides window.tdAudio for recorded-audio playback.
    Works on Chrome (desktop + Android) and Safari (iOS 14.5+).
  -->
  <script>
  (function () {
    'use strict';

    var synth = window.speechSynthesis;
    var _safetyTimer   = null;
    var _speechDone    = false;

    // ── Voice loading ───────────────────────────────────────────
    // iOS Safari does NOT fire onvoiceschanged and loads voices lazily.
    // Poll aggressively at startup so voices are ready before first tap.
    window._tdTTSVoices = [];
    function _loadVoices() {
      var v = synth.getVoices();
      if (v && v.length > 0) { window._tdTTSVoices = v; }
    }
    _loadVoices();
    if ('onvoiceschanged' in synth) {
      synth.onvoiceschanged = _loadVoices;
    }
    // Fallback polling for iOS Safari (which may never fire onvoiceschanged)
    [200, 500, 1000, 2000, 3500, 6000].forEach(function(ms) {
      setTimeout(_loadVoices, ms);
    });

    // ── Helper: fire the Dart completion bridge ─────────────────
    function _notifyDone() {
      if (typeof window.tdTTSDone === 'function') { window.tdTTSDone(); }
    }

    // ── Helper: pick the best English voice ────────────────────
    function _pickVoice(lang) {
      var voices = window._tdTTSVoices;
      var prefix = (lang || 'en').split('-')[0];
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.indexOf(prefix) === 0 && voices[i].localService) {
          return voices[i];
        }
      }
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.indexOf(prefix) === 0) { return voices[i]; }
      }
      return null;
    }

    // ═════════════════════════════════════════════════════════════
    // GLOBAL AUDIO UNLOCK — runs on the FIRST raw DOM touch/click
    // so iOS Safari considers it a genuine user gesture.
    // This unlocks both SpeechSynthesis AND HTMLAudioElement for
    // the entire session. Must happen BEFORE Flutter processes
    // the touch (Flutter's web engine dispatches asynchronously).
    // ═════════════════════════════════════════════════════════════
    var _audioUnlocked = false;

    function _globalUnlock() {
      if (_audioUnlocked) return;
      _audioUnlocked = true;

      // 1. Unlock SpeechSynthesis
      try {
        var su = new SpeechSynthesisUtterance('\u200B');
        su.volume = 0;
        su.rate   = 10;
        su.onend = su.onerror = function() {};
        synth.speak(su);
      } catch (e) {}

      // 2. Unlock AudioContext (used internally by audioplayers_web)
      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          var buf = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          if (ctx.state === 'suspended') { ctx.resume(); }
        }
      } catch (e) {}

      // 3. Unlock HTMLAudioElement — play a tiny silent MP3.
      //    Once ANY <audio> has played in a user gesture, iOS allows
      //    all subsequent <audio>.play() calls in the same tab.
      try {
        var silentMp3 = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAABhgBAAAAA//tQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tQZB4P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';
        var a = new Audio(silentMp3);
        a.volume = 0.01;
        a.play().then(function() { a.pause(); a = null; }).catch(function() {});
      } catch (e) {}

      // Remove listeners after first unlock
      document.removeEventListener('touchstart', _globalUnlock, true);
      document.removeEventListener('touchend', _globalUnlock, true);
      document.removeEventListener('click', _globalUnlock, true);
    }

    // Capture-phase listeners fire before Flutter's own listeners
    document.addEventListener('touchstart', _globalUnlock, { passive: true, capture: true });
    document.addEventListener('touchend',   _globalUnlock, { passive: true, capture: true });
    document.addEventListener('click',      _globalUnlock, { passive: true, capture: true });

    // ═════════════════════════════════════════════════════════════
    // tdAudio — Direct HTML5 audio playback for recorded phrases.
    // Bypasses audioplayers (which may break on iOS due to async).
    // ═════════════════════════════════════════════════════════════
    var _currentAudio = null;

    window.tdAudio = {
      play: function (url, volume) {
        // Stop previous
        if (_currentAudio) {
          try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
        }
        var a = new Audio(url);
        a.volume = Math.min(Math.max(volume || 1, 0), 1);
        _currentAudio = a;
        a.onended = function () {
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        };
        a.onerror = function () {
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        };
        a.play().catch(function (e) {
          console.warn('[tdAudio] play failed:', e);
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        });
      },
      stop: function () {
        if (_currentAudio) {
          try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
          _currentAudio = null;
        }
      }
    };

    // ═════════════════════════════════════════════════════════════
    // tdTTS — Text-to-Speech via Web Speech API
    // ═════════════════════════════════════════════════════════════
    window.tdTTS = {

      // ── unlock ───────────────────────────────────────────────
      // Called by _globalUnlock on first touch.
      // Can also be called manually; guards against double calls.
      unlock: function () {
        // globalUnlock already handles this; keep as no-op fallback
      },

      // ── getVoices ─────────────────────────────────────────────
      getVoices: function () {
        return JSON.stringify(window._tdTTSVoices.map(function (v) {
          return { name: v.name, uri: v.voiceURI, lang: v.lang, local: v.localService };
        }));
      },

      // ── speak ────────────────────────────────────────────────
      speak: function (text, rate, voiceURI) {
        if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
        _speechDone = false;

        // Always cancel first — clean slate
        if (synth.speaking || synth.pending) {
          synth.cancel();
        }
        if (synth.paused) { synth.resume(); }

        var spRate = (typeof rate === 'number' && rate > 0) ? rate : 0.9;

        var u = new SpeechSynthesisUtterance(text);
        u.lang   = 'en-US';
        u.rate   = spRate;
        u.pitch  = 1.0;
        u.volume = 1.0;

        // Voice selection
        var bestVoice = null;
        if (voiceURI) {
          for (var i = 0; i < window._tdTTSVoices.length; i++) {
            if (window._tdTTSVoices[i].voiceURI === voiceURI) {
              bestVoice = window._tdTTSVoices[i];
              break;
            }
          }
        }
        if (!bestVoice) { bestVoice = _pickVoice('en'); }
        if (bestVoice) { u.voice = bestVoice; }

        function _done() {
          if (_speechDone) return;
          _speechDone = true;
          if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
          _notifyDone();
        }

        u.onend  = _done;
        u.onerror = function (e) {
          if (e.error !== 'interrupted' && e.error !== 'canceled') { _done(); }
        };

        synth.speak(u);

        // iOS Safari: poke resume after speak
        if (synth.paused) { synth.resume(); }

        // Safety timeout
        var words = text.trim().split(/\s+/).length;
        var ms = Math.max(2500, Math.round(words * 450 / spRate) + 2000);
        _safetyTimer = setTimeout(function () {
          if (!_speechDone) { _speechDone = true; _notifyDone(); }
        }, ms);
      },

      // ── stop ─────────────────────────────────────────────────
      stop: function () {
        _speechDone = true;
        if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
        if (synth.speaking || synth.pending) { synth.cancel(); }
      }
    };
  })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
