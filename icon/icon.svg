  <!--
    TouchTab icon — speech bubble with AAC sound-wave bars.
    Designed to work as:
      • Regular icon  (browser tab, bookmark)
      • PWA home-screen icon
      • Maskable icon  (content within the central 80% safe zone)
      • Apple touch icon
  -->
  <!-- Full-bleed background — browser/OS applies rounding for home-screen icons -->
  <rect
     width="512"
     height="512"
     fill="#09090b"
     id="rect1" />
  <rect
     x="157.28572"
     y="107.85715"
     width="232"
     height="210"
     rx="116"
     fill="#6366f1"
     id="rect2-9"
     style="mix-blend-mode:normal;fill:#9292f4;fill-opacity:1;stroke-width:0.862316" />
  <polygon
     points="218,318 148,318 124,392 "
     fill="#6366f1"
     id="polygon2-5"
     transform="translate(36.428571,-25.714282)"
     style="mix-blend-mode:normal;fill:#9ea2f7;fill-opacity:0.13197969;filter:url(#filter6)" />
  <polygon
     points="148,318 124,392 218,318 "
     fill="#6366f1"
     id="polygon2"
     transform="translate(32,-29.714286)" />
  <!-- Indigo speech bubble body  (safe-zone: ~x100..412  y110..360) -->
  <rect
     x="140"
     y="110"
     width="232"
     height="210"
     rx="116"
     fill="#6366f1"
     id="rect2"
