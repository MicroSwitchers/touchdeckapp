  <!--
    TouchTab icon — speech bubble with AAC sound-wave bars.
    Designed to work as:
      • Regular icon  (browser tab, bookmark)
      • PWA home-screen icon
      • Maskable icon  (content within the central 80% safe zone)
      • Apple touch icon
  -->
  <!-- Full-bleed background — browser/OS applies rounding for home-screen icons -->
  <rect
     width="512"
     height="512"
     fill="#09090b"
     id="rect1" />
  <rect
     x="146.73413"
     y="101.39217"
