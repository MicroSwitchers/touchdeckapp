  <rect
     x="143.58064"
     y="-312.58224"
     width="214.26727"
     height="195.73592"
     rx="107.13364"
     fill="#6366f1"
     id="rect2-2"
     style="fill:url(#radialGradient6);stroke-width:0.800067"
     transform="scale(1,-1)" />
  <!-- Bubble tail pointing bottom-left, tucked inside safe zone -->
  <!-- Three white sound-wave bars (AAC / speaking symbol) -->
  <!-- Left bar — shorter -->
  <rect
     x="184.14285"
     y="173.64374"
     width="30.162258"
     height="88.712524"
     rx="15.081129"
     fill="#ffffff"
