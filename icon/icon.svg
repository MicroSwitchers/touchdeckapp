  <polygon
     points="124,392 218,318 148,318 "
     fill="#6366f1"
     id="polygon2-5"
     transform="matrix(1.1330239,0,0,1.1330239,9.8000794,-49.947455)"
     style="mix-blend-mode:normal;fill:#9ea2f7;fill-opacity:0.13198;filter:url(#filter6)" />
  <polygon
     points="218,318 148,318 124,392 "
     fill="#6366f1"
     id="polygon2"
     transform="matrix(1.1330239,0,0,1.1330239,4.7824024,-54.479555)" />
  <!-- Indigo speech bubble body  (safe-zone: ~x100..412  y110..360) -->
