<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="touch_deck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>touch_deck</title>
  <link rel="manifest" href="manifest.json">

  <!--
    TouchDeck Web Speech API helper.
    Provides window.tdTTS with speak / stop / unlock methods.
    Also provides window.tdAudio for recorded-audio playback.
    Works on Chrome (desktop + Android) and Safari (iOS 14.5+).
  -->
  <script>
  (function () {
    'use strict';

    var synth = window.speechSynthesis;
    var _safetyTimer   = null;
    var _speechDone    = false;
    var _speakingReal  = false; // true while real (non-warmup) speech plays

    // ── Voice loading ───────────────────────────────────────────
    window._tdTTSVoices = [];
    function _loadVoices() {
      var v = synth.getVoices();
      if (v && v.length > 0) { window._tdTTSVoices = v; }
    }
    _loadVoices();
    if ('onvoiceschanged' in synth) {
      synth.onvoiceschanged = _loadVoices;
    }
    [200, 500, 1000, 2000, 3500, 6000].forEach(function(ms) {
      setTimeout(_loadVoices, ms);
    });

    function _notifyDone() {
      if (typeof window.tdTTSDone === 'function') { window.tdTTSDone(); }
    }

    function _pickVoice(lang) {
      // Force fetching voices again to wake up iOS SpeechSynthesis after recording
      var voices = synth.getVoices();
      if (!voices || voices.length === 0) voices = window._tdTTSVoices;
      else window._tdTTSVoices = voices;
      
      var prefix = (lang || 'en').split('-')[0];
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.indexOf(prefix) === 0 && voices[i].localService) return voices[i];
      }
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.indexOf(prefix) === 0) return voices[i];
      }
      return null;
    }

    // ═════════════════════════════════════════════════════════════
    // iOS SPEECH PRIMING — fires on touchstart only
    //
    // iOS Safari requires speechSynthesis.speak() to be called in
    // a user-gesture context. Flutter dispatches touches
    // asynchronously (~200ms delay), so Dart's speak() call arrives
    // AFTER iOS has closed the gesture window.
    //
    // Fix: On touchstart, immediately speak an ultra-short silent
    // utterance (zero-width space at max rate). It completes in
    // milliseconds, refreshing iOS's ~2s activation window without
    // holding the audio session. Dart's async speak() call arrives
    // well within that window.
    //
    // IMPORTANT: Only touchstart — NOT touchend or click.
    // touchend is redundant; click fires AFTER Flutter handles the
    // gesture (~300ms), which would disrupt recording/audio playback.
    // ═════════════════════════════════════════════════════════════

    var _lastPrimeTime = 0;
    var _isRecording    = false;  // set by Dart before/after getUserMedia

    function _touchPrime() {
      // Don't interrupt real speech, don't interfere with recording,
      // and throttle to once per 100ms.
      if (_speakingReal) return;
      if (_isRecording)  return;   // <-- KEY: skip when mic is active
      var now = Date.now();
      if (now - _lastPrimeTime < 100) return;
      _lastPrimeTime = now;

      try {
        // Speak a long, slow, silent warmup to keep synth "warm"
        // for ~2-3 seconds — well past the ~200ms until Dart calls speak().
        // Uses periods which take real time to synthesize but are nearly
        // inaudible at volume 0.01 on a phone speaker.
        if (synth.speaking || synth.pending) { synth.cancel(); }
        var w = new SpeechSynthesisUtterance('. . . . . . . . . . . . .');
        w.volume = 0.01;
        w.rate   = 0.1;
        w.onend = w.onerror = function() {};
        synth.speak(w);
      } catch(e) {}
    }

    // Capture-phase: fires before Flutter's handlers
    document.addEventListener('touchstart', _touchPrime, { passive: true, capture: true });
    document.addEventListener('touchend',   _touchPrime, { passive: true, capture: true });
    document.addEventListener('click',      _touchPrime, { passive: true, capture: true });

    // ═════════════════════════════════════════════════════════════
    // tdRecord — called by Dart to coordinate iOS audio session
    // around microphone use, preventing TTS/recording conflicts.
    // ═════════════════════════════════════════════════════════════
    window.tdRecord = {
      // Call this synchronously BEFORE starting getUserMedia.
      // Cancels any pending TTS and signals _touchPrime to skip
      // so iOS can switch its audio session to record mode.
      prepare: function () {
        _isRecording = true;
        _speakingReal = false;
        if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
        try {
          if (synth.speaking || synth.pending) { synth.cancel(); }
        } catch (e) {}
      },

      // Call this AFTER recording is fully stopped.
      // Re-enables _touchPrime so the next user tap can re-prime TTS.
      cleanup: function () {
        _isRecording = false;
        // After getUserMedia, iOS Safari SpeechSynthesis can get physically
        // stuck in a paused/speaking state. We force a reset here.
        try {
          if (synth.speaking || synth.pending) { synth.cancel(); }
          if (synth.paused) { synth.resume(); }
        } catch(e) {}
      }
    };

    // ═════════════════════════════════════════════════════════════
    // ONE-TIME AudioContext + HTMLAudioElement unlock
    // (Only needed once per page load, unlike SpeechSynthesis)
    // ═════════════════════════════════════════════════════════════
    var _audioUnlocked = false;

    function _unlockAudio() {
      if (_audioUnlocked) return;
      _audioUnlocked = true;

      // Unlock AudioContext
      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          var buf = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          if (ctx.state === 'suspended') { ctx.resume(); }
        }
      } catch (e) {}

      // Unlock HTMLAudioElement with silent MP3
      try {
        var silentMp3 = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAABhgBAAAAA//tQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tQZB4P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';
        var a = new Audio(silentMp3);
        a.volume = 0.01;
        a.play().then(function() { a.pause(); a = null; }).catch(function() {});
      } catch (e) {}

      document.removeEventListener('touchstart', _unlockAudio, true);
      document.removeEventListener('touchend', _unlockAudio, true);
      document.removeEventListener('click', _unlockAudio, true);
    }

    document.addEventListener('touchstart', _unlockAudio, { passive: true, capture: true });
    document.addEventListener('touchend',   _unlockAudio, { passive: true, capture: true });
    document.addEventListener('click',      _unlockAudio, { passive: true, capture: true });

    // ═════════════════════════════════════════════════════════════
    // tdAudio — Direct HTML5 audio playback for recorded phrases
    // ═════════════════════════════════════════════════════════════
    var _currentAudio = null;

    window.tdAudio = {
      play: function (url, volume) {
        if (_currentAudio) {
          try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
        }
        var a = new Audio(url);
        a.volume = Math.min(Math.max(volume || 1, 0), 1);
        _currentAudio = a;
        a.onended = function () {
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        };
        a.onerror = function () {
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        };
        a.play().catch(function (e) {
          console.warn('[tdAudio] play failed:', e);
          _currentAudio = null;
          if (typeof window.tdAudioDone === 'function') { window.tdAudioDone(); }
        });
      },
      stop: function () {
        if (_currentAudio) {
          try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
          _currentAudio = null;
        }
      }
    };

    // ═════════════════════════════════════════════════════════════
    // tdTTS — Text-to-Speech via Web Speech API
    // ═════════════════════════════════════════════════════════════
    window.tdTTS = {

      unlock: function () { /* handled by _touchPrime */ },

      getVoices: function () {
        return JSON.stringify(window._tdTTSVoices.map(function (v) {
          return { name: v.name, uri: v.voiceURI, lang: v.lang, local: v.localService };
        }));
      },

      speak: function (text, rate, voiceURI) {
        if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
        _speechDone = false;
        _speakingReal = true;

        // Cancel warmup or previous speech — synth was JUST active
        // from the touchPrime warmup, so iOS allows this cancel+speak.
        if (synth.speaking || synth.pending) {
          synth.cancel();
        }
        if (synth.paused) { synth.resume(); }

        var spRate = (typeof rate === 'number' && rate > 0) ? rate : 0.9;

        var u = new SpeechSynthesisUtterance(text);
        u.lang   = 'en-US';
        u.rate   = spRate;
        u.pitch  = 1.0;
        u.volume = 1.0;

        var bestVoice = null;
        if (voiceURI) {
          var currentVoices = synth.getVoices();
          if (!currentVoices || currentVoices.length === 0) currentVoices = window._tdTTSVoices;
          
          for (var i = 0; i < currentVoices.length; i++) {
            if (currentVoices[i].voiceURI === voiceURI) {
              bestVoice = currentVoices[i];
              break;
            }
          }
        }
        if (!bestVoice) { bestVoice = _pickVoice('en'); }
        if (bestVoice) { u.voice = bestVoice; }

        function _done() {
          if (_speechDone) return;
          _speechDone = true;
          _speakingReal = false;
          if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
          _notifyDone();
        }

        u.onend  = _done;
        u.onerror = function (e) {
          if (e.error !== 'interrupted' && e.error !== 'canceled') { _done(); }
        };

        synth.speak(u);
        if (synth.paused) { synth.resume(); }

        // Safety timeout
        var words = text.trim().split(/\s+/).length;
        var ms = Math.max(2500, Math.round(words * 450 / spRate) + 2000);
        _safetyTimer = setTimeout(function () {
          if (!_speechDone) { _speechDone = true; _speakingReal = false; _notifyDone(); }
        }, ms);
      },

      stop: function () {
        _speechDone = true;
        _speakingReal = false;
        if (_safetyTimer) { clearTimeout(_safetyTimer); _safetyTimer = null; }
        if (synth.speaking || synth.pending) { synth.cancel(); }
      }
    };
  })();
  </script>
</head>

  <script src="flutter_bootstrap.js" async></script>
</body>
